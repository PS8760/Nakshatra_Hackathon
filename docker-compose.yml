version: '3.9'

services:
  backend:
    build: ./backend
    container_name: neurorestore-backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - sqlite-data:/app/data
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - neurorestore-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: neurorestore-frontend
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - neurorestore-net

volumes:
  sqlite-data:

networks:
  neurorestore-net:
    driver: bridge
